
<style>
@import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --parch:#2a1f0e;
  --parch2:#1a1208;
  --gold:#c9a84c;
  --gold2:#f0d080;
  --gold3:#7a5a1a;
  --fog:#3a3050;
  --ink:#e8d9b0;
  --ink2:#a08858;
  --red:#8b1a1a;
}
#app{font-family:'Cinzel',serif;display:flex;flex-direction:column;min-height:740px;background:var(--parch2);color:var(--ink)}
#toolbar{
  display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;
  border-bottom:1px solid var(--gold3);
  background:linear-gradient(180deg,#1a1208 0%,#2a1f0e 100%);
  align-items:center;
}
.tbtn{
  padding:5px 12px;
  border:1px solid var(--gold3);
  border-radius:3px;
  background:transparent;
  color:var(--ink2);
  cursor:pointer;
  font-size:11px;
  font-family:'Cinzel',serif;
  display:flex;align-items:center;gap:5px;
  transition:all .15s;
  letter-spacing:.03em;
}
.tbtn:hover{background:rgba(201,168,76,.12);color:var(--gold);border-color:var(--gold3);}
.tbtn.on{background:rgba(201,168,76,.18);color:var(--gold2);border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.2);}
.sep{width:1px;height:22px;background:var(--gold3);margin:0 3px;opacity:.5;flex-shrink:0}
#canvas-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:auto;padding:20px;min-height:570px;position:relative;
  background:radial-gradient(ellipse at center,#1e1508 0%,#0d0a05 100%);
}
#wrap{position:relative;display:inline-block;
  box-shadow:0 0 0 2px var(--gold3),0 0 0 4px #0d0a05,0 0 30px rgba(0,0,0,.8);
}
#map-canvas{display:block;}
#fog-canvas{display:block;position:absolute;top:0;left:0;pointer-events:none;}
#interact-canvas{display:block;position:absolute;top:0;left:0;cursor:crosshair;}#overlay{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;}.token{position:absolute;width:40px;height:40px;border-radius:50%;background:#c33;color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:grab;pointer-events:auto;user-select:none;box-shadow:0 2px 6px #000;}.maplabel{position:absolute;color:#ffd86a;font:18px Cinzel,serif;text-shadow:1px 1px 2px #000;pointer-events:auto;cursor:move;white-space:nowrap;}
#empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px;text-align:center;}
#empty-icon{font-size:64px;color:var(--gold3);opacity:.5;}
#empty h2{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--gold);letter-spacing:.1em;font-weight:400;}
#empty p{font-size:12px;color:var(--ink2);letter-spacing:.05em;max-width:280px;line-height:1.7;}
#bottom{
  display:flex;align-items:center;gap:12px;padding:8px 14px;flex-wrap:wrap;
  border-top:1px solid var(--gold3);
  background:linear-gradient(0deg,#1a1208 0%,#2a1f0e 100%);
  font-size:11px;
}
.ctrl{display:flex;align-items:center;gap:7px;color:var(--ink2);font-size:11px;letter-spacing:.04em;}
input[type=range]{
  -webkit-appearance:none;width:90px;height:3px;
  background:var(--gold3);border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--gold);border:1px solid var(--gold2);cursor:pointer;
}
input[type=color]{width:24px;height:24px;border:1px solid var(--gold3);border-radius:3px;cursor:pointer;padding:1px;background:transparent;}
#file-in{display:none;}
#pct{margin-left:auto;font-size:11px;color:var(--gold);letter-spacing:.08em;}
.mode-label{font-size:10px;color:var(--ink2);letter-spacing:.06em;margin-right:2px;}
#title-bar{
  text-align:center;padding:7px 14px 5px;
  background:#0d0a05;border-bottom:1px solid var(--gold3);
  font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);
  letter-spacing:.18em;font-weight:400;
}
.rune{color:var(--gold3);margin:0 6px;font-size:10px;}
</style>

<div id="app">
  <div id="title-bar">
    <span class="rune">✦</span> Voile des Ombres <span class="rune">✦</span> Brouillard de Guerre <span class="rune">✦</span>
  </div>

  <div id="toolbar">
    <button class="tbtn" onclick="document.getElementById('file-in').click()">
      <i class="ti ti-scroll" aria-hidden="true"></i> Charger une carte
    </button>
    <input type="file" id="file-in" accept="image/*">

    <div class="sep"></div>
    <span class="mode-label">MODE</span>
    <button class="tbtn on" id="btn-reveal" onclick="setMode('reveal')">
      <i class="ti ti-eye" aria-hidden="true"></i> Révéler
    </button>
    <button class="tbtn" id="btn-hide" onclick="setMode('hide')">
      <i class="ti ti-eye-off" aria-hidden="true"></i> Voiler
    </button>

    <div class="sep"></div>
    <span class="mode-label">FORME</span>
    <button class="tbtn" id="btn-circle" onclick="setShape('circle')">
      <i class="ti ti-circle" aria-hidden="true"></i> Rond
    </button>
    <button class="tbtn on" id="btn-square" onclick="setShape('square')">
      <i class="ti ti-square" aria-hidden="true"></i> Carré
    </button>

    <div class="sep"></div>
    <button class="tbtn" onclick="revealAll()">
      <i class="ti ti-sun" aria-hidden="true"></i> Tout révéler
    </button>
    <button class="tbtn" onclick="hideAll()">
      <i class="ti ti-moon" aria-hidden="true"></i> Tout voiler
    </button>

    <div class="sep"></div>
    <div class="ctrl">
      <label>Couleur du voile</label>
      <input type="color" id="fog-color" value="#2a2035">
    </div>
    <div class="ctrl">
      <label>Opacité</label>
      <input type="range" id="fog-opacity" min="20" max="100" value="90" step="1">
      <span id="op-val">90</span>%
    </div>

    <div class="sep"></div>
    <button class="tbtn" id="btn-token" onclick="setTool('token')">🧙 Tokens</button>
    <button class="tbtn" onclick="addToken()">➕ Ajouter un token</button>
    <button class="tbtn" id="btn-text" onclick="setTool('text')">✎ Texte</button>
    <button class="tbtn" onclick="saveFog()">
      <i class="ti ti-download" aria-hidden="true"></i> Exporter
    </button>
  </div>

  <div id="canvas-area">
    <div id="empty">
      <i class="ti ti-map-2" id="empty-icon" aria-hidden="true"></i>
      <h2>Carte inconnue</h2>
      <p>Chargez une carte pour commencer à révéler le monde aux aventuriers...</p>
      <button class="tbtn" style="margin-top:6px;padding:8px 18px;" onclick="document.getElementById('file-in').click()">
        <i class="ti ti-upload" aria-hidden="true"></i> Ouvrir une carte
      </button>
    </div>
    <div id="wrap" style="display:none">
      <canvas id="map-canvas"></canvas>
      <canvas id="fog-canvas"></canvas>
      <canvas id="interact-canvas"></canvas><div id="overlay"></div>
    </div>
  </div>

  <div id="bottom">
    <div class="ctrl">
      <i class="ti ti-brush" aria-hidden="true" style="color:var(--gold3)"></i>
      <label>Taille du pinceau</label>
      <input type="range" id="brush-size" min="10" max="220" value="70" step="1">
      <span id="sz-val">70</span>px
    </div>
    <div class="sep"></div>
    <div class="ctrl">
      <i class="ti ti-wind" aria-hidden="true" style="color:var(--gold3)"></i>
      <label>Douceur des bords</label>
      <input type="range" id="feather" min="0" max="40" value="18" step="1">
      <span id="ft-val">18</span>
    </div>
    <div id="pct">Carte non chargée</div>
  </div>
</div>

<script>
const fileIn = document.getElementById('file-in');
const mapCanvas = document.getElementById('map-canvas');
const fogCanvas = document.getElementById('fog-canvas');
const interactCanvas = document.getElementById('interact-canvas');
const mapCtx = mapCanvas.getContext('2d');
const fogCtx = fogCanvas.getContext('2d');
const interactCtx = interactCanvas.getContext('2d');
const wrap = document.getElementById('wrap');
const empty = document.getElementById('empty');
const brushSlider = document.getElementById('brush-size');
const szVal = document.getElementById('sz-val');
const opSlider = document.getElementById('fog-opacity');
const opVal = document.getElementById('op-val');
const featherSlider = document.getElementById('feather');
const ftVal = document.getElementById('ft-val');
const fogColorPick = document.getElementById('fog-color');
const pctEl = document.getElementById('pct');

let mode = 'reveal';
let shape = 'square';
let drawing = false;
let lastX = -1, lastY = -1;
let loaded = false;

brushSlider.oninput = () => szVal.textContent = brushSlider.value;
opSlider.oninput = () => opVal.textContent = opSlider.value;
featherSlider.oninput = () => ftVal.textContent = featherSlider.value;

function setMode(m) {
  mode = m;
  document.getElementById('btn-reveal').classList.toggle('on', m==='reveal');
  document.getElementById('btn-hide').classList.toggle('on', m==='hide');
}
function setShape(s) {
  shape = s;
  document.getElementById('btn-circle').classList.toggle('on', s==='circle');
  document.getElementById('btn-square').classList.toggle('on', s==='square');
}

function hexToRgb(hex){
  return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const area = document.getElementById('canvas-area');
      const maxW = area.clientWidth - 50;
      const maxH = 520;
      let w = img.width, h = img.height;
      const scale = Math.min(1, maxW/w, maxH/h);
      w = Math.round(w*scale); h = Math.round(h*scale);
      mapCanvas.width = fogCanvas.width = interactCanvas.width = w;
      mapCanvas.height = fogCanvas.height = interactCanvas.height = h;
      mapCtx.drawImage(img, 0, 0, w, h);
      drawFogFull();
      empty.style.display = 'none';
      wrap.style.display = 'inline-block';
      loaded = true;
      updatePct();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawFogFull() {
  const [r,g,b] = hexToRgb(fogColorPick.value);
  const a = parseInt(opSlider.value)/100;
  fogCtx.clearRect(0,0,fogCanvas.width,fogCanvas.height);
  fogCtx.fillStyle = `rgba(${r},${g},${b},${a})`;
  fogCtx.fillRect(0,0,fogCanvas.width,fogCanvas.height);
}

fileIn.onchange = e => { if(e.target.files[0]) loadImage(e.target.files[0]); };
document.getElementById('canvas-area').addEventListener('dragover', e => e.preventDefault());
document.getElementById('canvas-area').addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) loadImage(f);
});

function getPos(e) {
  const rect = interactCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * interactCanvas.width / rect.width,
    y: (e.clientY - rect.top) * interactCanvas.height / rect.height
  };
}

function paint(x, y) {
  if (!loaded) return;
  const size = parseInt(brushSlider.value);
  const feather = parseInt(featherSlider.value);
  const half = size / 2;
  const [r,g,b] = hexToRgb(fogColorPick.value);
  const a = parseInt(opSlider.value)/100;

  if (lastX >= 0) {
    const dx = x-lastX, dy = y-lastY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const steps = Math.max(1, Math.ceil(dist / (size*0.25)));
    for (let i=1; i<=steps; i++) {
      const ix = lastX + dx*(i/steps);
      const iy = lastY + dy*(i/steps);
      paintStamp(ix, iy, half, feather, r, g, b, a);
    }
  } else {
    paintStamp(x, y, half, feather, r, g, b, a);
  }
  lastX = x; lastY = y;
  updatePct();
}

function paintStamp(x, y, half, feather, r, g, b, a) {
  if (mode === 'reveal') {
    if (feather > 0) {
      const steps = Math.max(1, feather);
      for (let s = steps; s >= 0; s--) {
        const t = s / steps;
        const rad = half * (0.6 + 0.4 * t);
        fogCtx.globalCompositeOperation = 'destination-out';
        fogCtx.globalAlpha = (1 - t * 0.7);
        drawShape(x, y, rad);
      }
      fogCtx.globalAlpha = 1;
    } else {
      fogCtx.globalCompositeOperation = 'destination-out';
      fogCtx.globalAlpha = 1;
      drawShape(x, y, half);
      fogCtx.globalAlpha = 1;
    }
  } else {
    fogCtx.globalCompositeOperation = 'source-over';
    if (feather > 0) {
      const steps = Math.max(1, feather);
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        const rad = half * (0.6 + 0.4 * t);
        fogCtx.globalAlpha = a * (1 - t * 0.7);
        fogCtx.fillStyle = `rgba(${r},${g},${b},1)`;
        drawShape(x, y, rad);
      }
    } else {
      fogCtx.globalAlpha = a;
      fogCtx.fillStyle = `rgba(${r},${g},${b},1)`;
      drawShape(x, y, half);
    }
    fogCtx.globalAlpha = 1;
  }
  fogCtx.globalCompositeOperation = 'source-over';
}

function drawShape(x, y, half) {
  fogCtx.beginPath();
  if (shape === 'circle') {
    fogCtx.arc(x, y, half, 0, Math.PI*2);
  } else {
    fogCtx.rect(x-half, y-half, half*2, half*2);
  }
  fogCtx.fill();
}

function drawCursor(x, y) {
  const size = parseInt(brushSlider.value);
  const half = size / 2;
  interactCtx.clearRect(0,0,interactCanvas.width,interactCanvas.height);
  interactCtx.save();
  if (mode === 'reveal') {
    interactCtx.strokeStyle = 'rgba(240,200,80,.9)';
    interactCtx.setLineDash([3,3]);
  } else {
    interactCtx.strokeStyle = 'rgba(150,130,200,.9)';
    interactCtx.setLineDash([3,3]);
  }
  interactCtx.lineWidth = 1.5;
  interactCtx.beginPath();
  if (shape === 'circle') {
    interactCtx.arc(x, y, half, 0, Math.PI*2);
  } else {
    interactCtx.rect(x-half, y-half, half*2, half*2);
  }
  interactCtx.stroke();
  interactCtx.restore();
}

interactCanvas.addEventListener('mousedown', e => {
  drawing=true; lastX=-1; lastY=-1;
  const p=getPos(e); paint(p.x,p.y);
});
interactCanvas.addEventListener('mousemove', e => {
  const p=getPos(e); drawCursor(p.x,p.y);
  if(drawing) paint(p.x,p.y);
});
interactCanvas.addEventListener('mouseup', ()=>{drawing=false;lastX=-1;lastY=-1;});
interactCanvas.addEventListener('mouseleave', ()=>{
  drawing=false;lastX=-1;lastY=-1;
  interactCtx.clearRect(0,0,interactCanvas.width,interactCanvas.height);
});
interactCanvas.addEventListener('touchstart', e=>{
  e.preventDefault(); drawing=true; lastX=-1; lastY=-1;
  const p=getPos(e.touches[0]); paint(p.x,p.y);
},{passive:false});
interactCanvas.addEventListener('touchmove', e=>{
  e.preventDefault(); const p=getPos(e.touches[0]); paint(p.x,p.y);
},{passive:false});
interactCanvas.addEventListener('touchend',()=>{drawing=false;lastX=-1;lastY=-1;});

function revealAll(){if(!loaded)return;fogCtx.clearRect(0,0,fogCanvas.width,fogCanvas.height);updatePct();}
function hideAll(){if(!loaded)return;drawFogFull();updatePct();}

function updatePct(){
  if(!loaded)return;
  const d=fogCtx.getImageData(0,0,fogCanvas.width,fogCanvas.height).data;
  let hidden=0,total=fogCanvas.width*fogCanvas.height;
  for(let i=3;i<d.length;i+=4){if(d[i]>20)hidden++;}
  const rev=Math.round((1-hidden/total)*100);
  pctEl.textContent=`✦ ${rev}% révélée`;
}

function saveFog(){
  if(!loaded)return;
  const out=document.createElement('canvas');
  out.width=mapCanvas.width;out.height=mapCanvas.height;
  const o=out.getContext('2d');
  o.drawImage(mapCanvas,0,0);
  o.drawImage(fogCanvas,0,0);
  const a=document.createElement('a');
  a.download='carte_joueurs.png';a.href=out.toDataURL('image/png');a.click();
}

const overlay=document.getElementById('overlay');
let tool='fog';
function setTool(t){
 tool=t;
 ['btn-token','btn-text'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('on');});
 if(t==='token')document.getElementById('btn-token').classList.add('on');
 if(t==='text')document.getElementById('btn-text').classList.add('on');
}
let tokenCount=1;
function addToken(){
 if(!loaded)return;
 const d=document.createElement('div');
 d.className='token';
 d.textContent=tokenCount++;
 d.style.left='10px';d.style.top='10px';
 makeDraggable(d);
 overlay.appendChild(d);
}
function makeDraggable(el){
 let ox,oy,drag=false;
 el.onmousedown=e=>{
   drag=true;ox=e.offsetX;oy=e.offsetY;e.stopPropagation();
 };
 window.addEventListener('mousemove',e=>{
   if(!drag)return;
   const r=wrap.getBoundingClientRect();
   let x=e.clientX-r.left-ox,y=e.clientY-r.top-oy;
   el.style.left=x+'px';el.style.top=y+'px';
 });
 window.addEventListener('mouseup',()=>drag=false);
}
interactCanvas.addEventListener('dblclick',e=>{
 if(tool!=='text')return;
 const t=prompt('Texte à écrire :');
 if(!t)return;
 const p=getPos(e);
 const d=document.createElement('div');
 d.className='maplabel';
 d.textContent=t;
 d.style.left=p.x+'px';
 d.style.top=p.y+'px';
 makeDraggable(d);
 overlay.appendChild(d);
});
const oldDown=interactCanvas.onmousedown;
interactCanvas.addEventListener('mousedown',e=>{
 if(tool!=='fog'){e.stopImmediatePropagation();e.preventDefault();}
},true);

</script>
